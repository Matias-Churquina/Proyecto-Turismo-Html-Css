<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Banco Macros | Banco Internet Personas </title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      background: url('Contenido/Imagenes/fondo-macro.jpg') no-repeat center center/cover;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      padding-right: 60px;
    }

    /* CONTENEDOR GENERAL */
    .login-wrapper {
      width: 330px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    /* ALERTA SUPERIOR */
    .warning-banner {
      background: #f2f2f2;
      border-radius: 22px;
      padding: 14px 18px;
      display: flex;
      align-items: center;
      gap: 14px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.25);
    }

    .warning-icon {
      font-size: 20px;
      color: #1f3566;
      flex-shrink: 0;
    }

    .warning-text {
      color: #1f3566;
      font-size: 13px;
      line-height: 1.2;
    }

    .warning-text strong {
      font-weight: bold;
    }

    /* FORMULARIO */
    .form-container {
      width: 100%;
      background: #efefef;
      border-radius: 28px;
      overflow: hidden;
      box-shadow: 0 8px 25px rgba(0,0,0,0.35);
    }

    .form-content {
      padding: 30px 25px 20px;
    }

    /* LOGO */
    .logo {
      text-align: center;
      font-size: 52px;
      color: #1f3566;
      margin-bottom: 20px;
    }

    /* TITULO */
    .main-title {
      font-size: 18px;
      font-weight: 500;
      font-weight: bold;
      color: #1f3566;
      margin-bottom: 28px;
    }

    /* LABEL */
    .custom-label {
      color: #1f3566;
      font-size: 16px;
      margin-bottom: 10px;
      display: block;
    }

    /* INPUTS */
    .custom-input {
      border: 2px solid #1f3566;
      border-radius: 14px;
      overflow: hidden;
      background: white;
      display: flex;
      align-items: center;
      padding: 0 12px;
      margin-bottom: 16px;
    }

    .custom-input input {
      border: none;
      outline: none;
      width: 100%;
      padding: 10px 6px;
      background: transparent;
      font-size: 14px;
    }

    .custom-input i {
      color: gray;
      font-size: 20px;
    }

    /* BOTON */
    .btn-login {
      width: 100%;
      background: #1f3566;
      color: white;
      border: none;
      padding: 8px;
      border-radius: 30px;
      font-size: 13px;
      font-weight: bold;
      margin: 2px 0 10px;
      transition: 0.3s;
    }

    .btn-login:hover {
      background: #16284d;
    }

    /* TECLADO */
    .virtual-keyboard {
      text-align: center;
      color: #1f3566;
      font-size: 13px;
      margin-bottom: 8px;
      cursor: pointer;
    }

    .virtual-keyboard i {
      margin-left: 8px;
    }

    /* FOOTER */
    .form-footer {
      background: #ddd1c7;
      text-align: center;
      padding: 12px;
      font-size: 13px;
    }

    .form-footer a {
      color: #1f3566;
      text-decoration: none;
      font-weight: 500;
    }

    .form-footer a:hover {
      text-decoration: underline;
    }

    /* Responsivo */
    @media (max-width: 768px) {
      body {
        justify-content: center;
        padding: 20px;
      }

      .login-wrapper {
        width: 100%;
        max-width: 390px;
      }

      .warning-text {
        font-size: 12px;
      }
    }
  </style>
  <link rel="icon" type="image/png" href="Contenido/Imagenes/logo-Macro.png">
</head>
<body>

  <div class="login-wrapper">

    <!-- ALERTA -->
    <div class="warning-banner">
      <div class="warning-icon">
        <i class="bi bi-exclamation-triangle-fill"></i>
      </div>

      <div class="warning-text">
        <strong>ALERTA VIRUS/ESTAFAS:</strong> Si ves un mensaje de actualización/autenticación de datos/programas/certificados digitales o similares, tu computadora está infectada, NO INGRESES TOKEN y comunícate urgente con nosotros.
      </div>
    </div>

    <!-- FORMULARIO -->
    <div class="form-container">

      <div class="form-content">

        <div class="logo">
          <img src="Contenido/Imagenes/icono-login_a.png" alt="Logo Banco Macros">
        </div>

        <h2 class="main-title text-center">Ingresá a Banca Internet</h2>

        <form>
          <label class="custom-label">Ingresá tu usuario</label>
          <div class="custom-input">
            <input type="text" placeholder="Usuario Banca Movil/Internet">
            <i class="bi bi-person-fill"></i>
          </div>

          <label class="custom-label">Ingresá tu contraseña</label>
          <div class="custom-input">
            <input type="password" placeholder="Contraseña">
            <i class="bi bi-eye-fill"></i>
          </div>

          <button type="submit" class="btn-login">Ingresá</button>

          <div class="virtual-keyboard">
            Teclado Virtual <i class="bi bi-keyboard"></i>
          </div>

        </form>

      </div>

      <div class="form-footer">
        <a href="#">¿No podés ingresar o sos nuevo?</a>
      </div>

    </div>

  </div>

</body>
</html>
