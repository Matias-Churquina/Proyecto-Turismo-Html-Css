<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto|Turismo</title>

    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/footer.css">
    <link rel="stylesheet" href="css/home.css">
    <link rel="stylesheet" href="css/contacto.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
        <header>
        <h1>Turismo</h1>
        <nav>
            <a href="index.html">Home</a>

            <div class="dropdown">
                <a href="destinos.html">Destinos</a>

                <div class="dropdown-content">
                    <a href="#">Playas</a>
                    <a href="#">Montañas</a>
                    <a href="#">Ciudades</a>
                </div>
            </div>

            <a href="agencias.html">Agencias</a>
            <a href="precios.html">Precios</a>
            <a href="contacto.html">Contacto</a>
            <a href="blog.html">Blog</a>
        </nav>
    </header>
    <section class="contacto py-5">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-lg-8 col-xl-7">

                    <h2 class="titulo-contacto text-center mb-5">
                        Contacto
                    </h2>

                    <form id="formulario" class="form-contacto shadow-lg">

                        <div class="mb-4">
                            <label for="nombre" class="form-label">Nombre</label>
                            <input
                                type="text"
                                id="nombre"
                                class="form-control form-control-lg"
                                placeholder="Eleonor"
                                required>
                        </div>

                        <div class="mb-4">
                            <label for="apellido" class="form-label">Apellido</label>
                            <input
                                type="text"
                                id="apellido"
                                class="form-control form-control-lg"
                                placeholder="Rigby"
                                required>
                        </div>

                        <div class="mb-4">
                            <label for="email" class="form-label">Email</label>
                            <input
                                type="email"
                                id="email"
                                class="form-control form-control-lg"
                                placeholder="eleonor@email.com"
                                required>
                        </div>

                        <div class="mb-4">
                            <label for="celular" class="form-label">Celular</label>
                            <input
                                type="tel"
                                id="celular"
                                class="form-control form-control-lg"
                                placeholder="3812367890"
                                required>
                        </div>

                        <div class="mb-4">
                            <label for="mensaje" class="form-label">Mensaje</label>
                            <textarea
                                id="mensaje"
                                rows="6"
                                class="form-control"
                                placeholder="Escriba su mensaje..."
                                required></textarea>
                        </div>

                        <button type="submit" class="btn btn-primary btn-lg w-100 btn-enviar">
                            Enviar Mensaje
                        </button>

                    </form>

                </div>
            </div>
        </div>
    </section>

    <!-- Loading -->
    <div class="loading" id="loading">
        <div class="spinner-border text-light" role="status">
            <span class="visually-hidden">Cargando...</span>
        </div>
        <p class="mt-3">Enviando mensaje...</p>
    </div>

    <!-- Modal Bootstrap -->
    <div class="modal fade" id="modalExito" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content text-center p-4">

                <div class="modal-header border-0">
                    <h5 class="modal-title w-100">
                        ¡Mensaje enviado!
                    </h5>
                    <button type="button"
                            class="btn-close"
                            data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">
                    <p>
                        Gracias por contactarnos.
                        Nos comunicaremos contigo pronto.
                    </p>
                </div>

                <div class="modal-footer border-0 justify-content-center">
                    <button type="button"
                            class="btn btn-primary"
                            data-bs-dismiss="modal">
                        Cerrar
                    </button>
                </div>

            </div>
        </div>
    </div>
    <footer>
        <form>
            <input type="email" placeholder="Tu email">
            <button>Suscribirse</button>
        </form>

        <div class="redes">
            <a href="#" class="btn facebook">Facebook</a>
            <a href="#" class="btn instagram">Instagram</a>
        </div>

        <iframe src="https://www.google.com/maps?q=Jujuy&output=embed"></iframe>
    </footer>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/contacto.js"></script>
</body>
</html>
