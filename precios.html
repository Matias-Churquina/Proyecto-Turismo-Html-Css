<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Precios - Turismo</title>

    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/footer.css">
    <link rel="stylesheet" href="css/precios.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <link rel="icon" type="image/png" href="Contenido/HomeC/mountain-city-solid.png">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <header></header>

    <main class="precios">

        <div class="container py-5">

            <h1 class="text-center mb-4">Comparador de Destinos</h1>
            <p class="text-center mb-5">
                Elegí el paquete ideal para tus próximas vacaciones.
            </p>

            <div class="table-responsive">

                <table class="table table-bordered table-hover align-middle text-center shadow">

                    <thead class="table-dark">
                        <tr>
                            <th>Destino</th>
                            <th>Precio</th>
                            <th>Días</th>
                            <th>Hotel</th>
                            <th>Incluye</th>
                            <th>Temporada</th>
                        </tr>
                    </thead>

                    <tbody class="paquetes">

                        <tr>
                            <td><i class="fa-solid fa-umbrella-beach"></i> Playas</td>
                            <td>$250 USD</td>
                            <td>3</td>
                            <td>⭐⭐⭐</td>
                            <td data-bs-toggle="tooltip" title="Transporte + desayuno + piscina">
                                Sí
                            </td>
                            <td>Verano</td>
                        </tr>

                        <tr>
                            <td><i class="fa-solid fa-mountain"></i> Montañas</td>
                            <td>$320 USD</td>
                            <td>5</td>
                            <td>⭐⭐⭐⭐</td>
                            <td data-bs-toggle="tooltip" title="Hotel + guía + excursión">
                                Sí
                            </td>
                            <td>Invierno</td>
                        </tr>

                        <tr>
                            <td><i class="fa-solid fa-tree"></i> Bosques</td>
                            <td>$180 USD</td>
                            <td>2</td>
                            <td>⭐⭐</td>
                            <td data-bs-toggle="tooltip" title="Alojamiento + caminatas">
                                Parcial
                            </td>
                            <td>Todo el año</td>
                        </tr>

                        <tr>
                            <td><i class="fa-solid fa-city"></i> Ciudades</td>
                            <td>$290 USD</td>
                            <td>4</td>
                            <td>⭐⭐⭐⭐</td>
                            <td data-bs-toggle="tooltip" title="Hotel + city tour + desayuno">
                                Sí
                            </td>
                            <td>Todo el año</td>
                        </tr>

                    </tbody>

                </table>

            </div>

        </div>

    </main>

    <footer></footer>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        $(document).ready(function () {

            $("header").load("header.html");
            $("footer").load("footer.html");

            /* Hover dinámico con jQuery */
            $("tbody tr").hover(
                function () {
                    $(this).addClass("table-primary");
                },
                function () {
                    $(this).removeClass("table-primary");
                }
            );

            /* Tooltips */
            $('[data-bs-toggle="tooltip"]').tooltip();

        });
    </script>

</body>

</html>
